# Basic settings
set -g default-terminal "screen-256color"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1

# Faster command sequences
set -s escape-time 10
set -sg repeat-time 600

# Renumber windows when one is closed
set -g renumber-windows on

# Set terminal title
set -g set-titles on

# Status bar refresh interval
set -g status-interval 5

# Prefix key - use Ctrl-Space (more ergonomic than Ctrl-b)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Reload configuration
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Vim-style pane navigation (if vim is running, send keys to vim)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Split panes (more intuitive than % and ")
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r n next-window
bind -r p previous-window
bind t last-window

# Zoom pane
bind o resize-pane -Z

# Vi mode for copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Status bar - simple and clean
set -g status-style 'bg=#2e3440 fg=#d8dee9'
set -g status-left-length 40
set -g status-left '#[fg=#88c0d0,bold]❐ #S #[fg=#4c566a]│ '
set -g status-right-length 80
set -g status-right '#[fg=#4c566a]│ #[fg=#81a1c1]%Y-%m-%d #[fg=#4c566a]│ #[fg=#88c0d0,bold]%H:%M '

# Window status
set -g window-status-format '#[fg=#616e88] #I:#W '
set -g window-status-current-format '#[fg=#88c0d0,bold] #I:#W '
set -g window-status-separator ''

# Pane borders
set -g pane-border-style 'fg=#4c566a'
set -g pane-active-border-style 'fg=#88c0d0'

# Message style
set -g message-style 'bg=#88c0d0 fg=#2e3440 bold'

# Load local customizations if they exist
if-shell "[ -f ~/.tmux.conf.local ]" "source ~/.tmux.conf.local"
